# E-OS Notes CI — light tier on gitlab.com shared runners.
# The real target build (aarch64/x86_64-unknown-redox) happens in the meta-repo
# heavy build; here we gate formatting and a host build with the locked lockfile.

stages:
  - lint
  - build

fmt:
  image: "rust:slim"
  stage: lint
  script:
    - rustup component add rustfmt
    - cargo fmt -- --check

build-host:
  image: "rust:latest"
  stage: build
  script:
    # Hosts build the CLI/selftest half only (--no-default-features): the GUI
    # (Slint 1.1.1 + winit 0.28, the Redox-proven pin) no longer compiles on a
    # modern host rustc. The full GUI cross-build gate is the meta-repo heavy
    # image build (recipes/gui/eos-notes).
    - cargo build --locked --no-default-features
    - cargo run --locked --no-default-features -- --selftest
